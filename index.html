<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <meta name="theme-color" content="#0d1117">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="msapplication-navbutton-color" content="#0f172a">

    <title>ToolBox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js');
        });
      }
    </script>

    <style>
        /* Design 3: Cyber-Glass Neon */
        :root {
            --bg: radial-gradient(circle at center, #161b22 0%, #0d1117 100%);
            --system-bg: #0d1117;
            --surface: rgba(22, 27, 34, 0.8);
            --accent: #7cfc00;
            --accent-glow: rgba(124, 252, 0, 0.3);
            --border-neon: rgba(124, 252, 0, 0.2);
            --text-primary: #f8fafc;
            --text-secondary: #8b949e;
            --blur: 16px;
        }

        * {
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg);
            background-attachment: fixed;
            background-color: var(--system-bg);
            color: var(--text-primary);
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            min-height: 100vh;
        }

        .main-title {
            color: var(--text-primary);
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -2px;
            text-transform: uppercase;
            text-shadow: 0 0 20px var(--accent-glow);
            margin-bottom: 3rem;
            text-align: center;
        }

        .main-title span {
            color: var(--accent);
        }

        /* Tool Grid & Cards */
        .tool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .tool-card {
            background: var(--surface);
            backdrop-filter: blur(var(--blur));
            -webkit-backdrop-filter: blur(var(--blur));
            border: 1px solid var(--border-neon);
            border-radius: 20px;
            padding: 1.8rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 180px;
            position: relative;
            overflow: hidden;
        }

        .tool-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, transparent, rgba(124, 252, 0, 0.05));
            pointer-events: none;
        }

        .tool-card:hover {
            border-color: var(--accent);
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 0 0 15px var(--accent-glow);
        }

        .tool-title {
            color: var(--text-primary);
            font-size: 1.3rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .tool-path {
            color: var(--text-secondary);
            font-size: 0.75rem;
            font-family: 'Consolas', monospace;
            background: rgba(0,0,0,0.3);
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
            word-break: break-all;
        }

        .run-tag {
            margin-top: auto;
            font-size: 10px;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 6px 14px;
            border-radius: 8px;
            width: fit-content;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 1px;
            transition: 0.3s;
            background: rgba(124, 252, 0, 0.05);
        }

        .tool-card:hover .run-tag {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 10px var(--accent);
        }

        /* Hata Mesajı */
        .error-msg {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            color: #ff4444;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            font-family: monospace;
        }
    </style>
</head>
<body class="p-6 sm:p-12">

    <div class="max-w-6xl mx-auto">
        <h1 class="main-title">TOOL<span>BOX</span></h1>
        
        <div id="toolsGrid" class="tool-grid">
            </div>
    </div>

    <script>
        async function init() {
            const grid = document.getElementById('toolsGrid');
            try {
                const res = await fetch('list.json');
                if (!res.ok) throw new Error('Network response was not ok');
                const data = await res.json();

                // Manuel ve Pages listelerini birleştir
                const allItems = [...(data.manuel || []), ...(data.pages || [])];

                if (allItems.length === 0) {
                    grid.innerHTML = '<p class="text-center opacity-50">Henüz araç eklenmemiş.</p>';
                    return;
                }

                grid.innerHTML = ''; // İçeriği temizle

                allItems.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'tool-card';
                    card.onclick = () => window.location.href = item.path;
                    card.innerHTML = `
                        <div>
                            <div class="tool-title">${item.title}</div>
                            <div class="tool-path">${item.path}</div>
                        </div>
                        <div class="run-tag">
                            <i class="fa-solid fa-chevron-right mr-2"></i>Sayfaya Git
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (e) {
                grid.innerHTML = `
                    <div class="error-msg col-span-full">
                        <i class="fa-solid fa-triangle-exclamation mb-2 text-2xl"></i><br>
                        HATA: list.json dosyasına erişilemedi veya dosya formatı hatalı.
                    </div>
                `;
                console.error("ToolBox Error:", e);
            }
        }
        window.onload = init;
    </script>
</body>
</html>
