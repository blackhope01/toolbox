<!DOCTYPE html>
<html lang="tr">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <meta name="theme-color" content="#0d1117">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <title>ToolBox Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js');
        });
      }
    </script>

    <style>
        :root {
            --bg: radial-gradient(circle at center, #161b22 0%, #0d1117 100%);
            --system-bg: #0d1117;
            --surface: rgba(22, 27, 34, 0.8);
            --accent: #7cfc00;
            --accent-glow: rgba(124, 252, 0, 0.3);
            --border-neon: rgba(124, 252, 0, 0.2);
            --text-primary: #f8fafc;
            --text-secondary: #8b949e;
            --blur: 16px;
        }

        * { -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            background-attachment: fixed;
            background-color: var(--system-bg);
            color: var(--text-primary);
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }

        .main-title {
            color: var(--text-primary);
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -2px;
            text-transform: uppercase;
            text-shadow: 0 0 20px var(--accent-glow);
            margin-bottom: 3rem;
            text-align: center;
        }

        .main-title span { color: var(--accent); }

        .tool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .tool-card {
            background: var(--surface);
            backdrop-filter: blur(var(--blur));
            -webkit-backdrop-filter: blur(var(--blur));
            border: 1px solid var(--border-neon);
            border-radius: 24px;
            padding: 1.8rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 180px;
            position: relative;
            overflow: hidden;
        }

        .tool-card:hover {
            border-color: var(--accent);
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 0 0 15px var(--accent-glow);
        }

        /* FAVORİ YILDIZ BUTONU */
        .fav-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 1.4rem;
            color: var(--text-secondary);
            transition: all 0.3s ease;
            z-index: 20;
            padding: 8px;
            border-radius: 50%;
            background: rgba(0,0,0,0.2);
            line-height: 0;
        }

        .fav-btn:hover {
            color: #ffca28;
            background: rgba(255, 202, 40, 0.1);
            transform: scale(1.2);
        }

        .fav-btn.active {
            color: #ffca28;
            text-shadow: 0 0 12px rgba(255, 202, 40, 0.6);
        }

        .tool-title {
            color: var(--text-primary);
            font-size: 1.35rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            padding-right: 30px; /* Yıldızla çakışmaması için */
        }

        .tool-path {
            color: var(--text-secondary);
            font-size: 0.75rem;
            font-family: 'Consolas', monospace;
            background: rgba(0,0,0,0.3);
            padding: 4px 8px;
            border-radius: 6px;
            display: inline-block;
            word-break: break-all;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .run-tag {
            margin-top: auto;
            font-size: 10px;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 6px 14px;
            border-radius: 10px;
            width: fit-content;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 1px;
            transition: 0.3s;
            background: rgba(124, 252, 0, 0.05);
        }

        .tool-card:hover .run-tag {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 15px var(--accent);
        }

        .error-msg {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            color: #ff4444;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
        }
    </style>
</head>
<body class="p-6 sm:p-12">

    <div class="max-w-6xl mx-auto">
        <h1 class="main-title">TOOL<span>BOX</span></h1>
        <div id="toolsGrid" class="tool-grid"></div>
    </div>

    <script>
        // Favorileri LocalStorage'dan al
        let favorites = JSON.parse(localStorage.getItem('toolbox_favs')) || [];

        async function init() {
            const grid = document.getElementById('toolsGrid');
            try {
                const res = await fetch('list.json');
                if (!res.ok) throw new Error('Liste yüklenemedi');
                const data = await res.json();

                const allItems = [...(data.manuel || []), ...(data.pages || [])];
                
                if (allItems.length === 0) {
                    grid.innerHTML = '<p class="text-center opacity-50 col-span-full">Henüz araç eklenmemiş.</p>';
                    return;
                }

                renderTools(allItems);
            } catch (e) {
                grid.innerHTML = `
                    <div class="error-msg col-span-full">
                        <i class="fa-solid fa-triangle-exclamation mb-2 text-2xl"></i><br>
                        HATA: list.json dosyasına erişilemedi.
                    </div>
                `;
            }
        }

        function toggleFav(e, path) {
            e.stopPropagation(); // Karta gitmeyi engelle
            
            const index = favorites.indexOf(path);
            if (index !== -1) {
                // Zaten favoriyse çıkar
                favorites.splice(index, 1);
            } else {
                // Yeni favoriyi EN BAŞA ekle (En son eklenen en üstte)
                favorites.unshift(path);
            }
            
            localStorage.setItem('toolbox_favs', JSON.stringify(favorites));
            init(); // Listeyi anlık olarak yeniden sırala ve render et
        }

        function renderTools(items) {
            const grid = document.getElementById('toolsGrid');
            grid.innerHTML = '';

            // SIRALAMA MANTIĞI
            items.sort((a, b) => {
                const indexA = favorites.indexOf(a.path);
                const indexB = favorites.indexOf(b.path);

                const isAFav = indexA !== -1;
                const isBFav = indexB !== -1;

                // İkisi de favoriyse, favorites dizisindeki sırasına (indexine) göre diz
                if (isAFav && isBFav) return indexA - indexB;
                
                // Sadece biri favoriyse, o üste çıksın
                if (isAFav) return -1;
                if (isBFav) return 1;

                return 0; // Hiçbiri favori değilse orijinal sırayı bozma
            });

            items.forEach(item => {
                const isFav = favorites.includes(item.path);
                const card = document.createElement('div');
                card.className = 'tool-card';
                card.onclick = () => window.location.href = item.path;
                
                card.innerHTML = `
                    <div class="fav-btn ${isFav ? 'active' : ''}" onclick="toggleFav(event, '${item.path}')">
                        <i class="${isFav ? 'fa-solid' : 'fa-regular'} fa-star"></i>
                    </div>
                    <div>
                        <div class="tool-title">${item.title}</div>
                        <div class="tool-path">${item.path}</div>
                    </div>
                    <div class="run-tag">
                        <i class="fa-solid fa-chevron-right mr-2"></i>Sayfaya Git
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        window.onload = init;
    </script>
</body>
</html>
