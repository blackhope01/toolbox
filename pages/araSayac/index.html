<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="theme-color" content="#030712">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="manifest" href="manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js', { scope: './' });
      }
    </script>

    <title>Elektrik Fatura Hesapla</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    
    <style>
        :root {
            --bg: radial-gradient(circle at center, #111827 0%, #030712 100%);
            --surface: rgba(17, 24, 39, 0.85);
            --accent: #10b981; 
            --accent-glow: rgba(16, 185, 129, 0.3);
            --border: rgba(16, 185, 129, 0.2);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --danger: #ef4444;
            --blur: 16px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            background: #030712;
            margin: 0; padding: 0;
            width: 100%; min-height: 100%;
        }

        body {
            background: var(--bg);
            background-attachment: fixed;
            color: var(--text-primary);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 30px 0;
        }

        .glass-container {
            background: var(--surface);
            backdrop-filter: blur(var(--blur));
            -webkit-backdrop-filter: blur(var(--blur));
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 30px;
            width: 92%;
            max-width: 420px;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }

        .header-section { text-align: center; margin-bottom: 30px; }
        
        .logo-container {
            width: 80px;
            height: 80px;
            background: var(--accent-glow);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px auto;
            position: relative;
            box-shadow: 0 0 30px 5px var(--accent-glow);
        }

        .logo-container svg {
            width: 45px;
            height: 45px;
        }

        .history-wrapper { position: absolute; top: 25px; right: 25px; }
        .icon-btn { 
            background: rgba(0, 0, 0, 0.3); 
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 10px;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
        }
        .icon-btn:hover { color: var(--accent); border-color: var(--accent); transform: scale(1.05); }

        h1 { font-size: 24px; margin: 0; font-weight: 800; letter-spacing: -0.5px; }
        .sub-text { color: var(--text-secondary); font-size: 14px; margin-top: 5px; }

        .card { 
            background: rgba(0, 0, 0, 0.25); 
            border-radius: 20px; 
            padding: 25px; 
            margin-bottom: 20px; 
            border: 1px dashed var(--border);
        }

        .file-label { 
            display: flex; flex-direction: column; align-items: center; cursor: pointer; color: var(--accent); font-weight: 700; font-size: 14px; gap: 10px;
        }
        .file-label input { display: none; }

        /* HİZALAMA DÜZELTİLDİ: form-grid yapısı her iki alanda da aynı */
        .form-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            margin-bottom: 15px; 
            width: 100%;
        }

        .input-box { display: flex; flex-direction: column; width: 100%; }

        .input-box label { 
            display: block; 
            font-size: 11px; 
            color: var(--text-secondary); 
            margin-bottom: 7px; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .input-box input { 
            width: 100%; 
            background: #020617; 
            border: 1px solid #1e293b; 
            border-radius: 12px; 
            padding: 14px; 
            color: #fff; 
            font-size: 15px; 
            box-sizing: border-box; 
            height: 48px; /* Sabit yükseklik hizalamayı garanti eder */
        }

        .input-box input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 4px var(--accent-glow); }

        .glow-button { 
            width: 100%; background: var(--accent); color: #fff; border: none; padding: 18px; border-radius: 16px; font-size: 16px; font-weight: 800; cursor: pointer; transition: 0.3s; margin-top: 5px; text-transform: uppercase; letter-spacing: 1px;
        }
        .glow-button:hover { filter: brightness(1.1); transform: translateY(-2px); box-shadow: 0 12px 25px -5px var(--accent-glow); }

        .result-card { margin-top: 25px; background: linear-gradient(135deg, #064e3b 0%, #022c22 100%); padding: 25px; border-radius: 22px; text-align: center; border: 1px solid var(--accent); }
        .res-value { font-size: 38px; font-weight: 900; color: #fff; margin: 5px 0; }
        .res-title { color: rgba(255,255,255,0.7); font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }

        .modal { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal-content { background: #0f172a; border: 1px solid #1e293b; border-radius: 28px; width: 100%; max-width: 380px; padding: 25px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 12px; }
        .close-btn { background: none; border: none; color: var(--text-secondary); font-size: 32px; cursor: pointer; }

        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .action-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 10px; border-radius: 12px; cursor: pointer; color: var(--text-secondary); transition: 0.2s; }
        .action-btn.copy:hover { color: var(--accent); border-color: var(--accent); }
        .action-btn.delete:hover { color: var(--danger); border-color: var(--danger); }

        .status-msg { font-size: 12px; text-align: center; margin-top: 10px; color: var(--text-secondary); font-weight: 500; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="glass-container">
        <div class="history-wrapper">
            <button id="historyBtn" class="icon-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>
            </button>
        </div>

        <div class="header-section">
            <div class="logo-container">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M13 2L4 14H11L10 22L19 10H12L13 2Z" fill="#10b981"/>
                </svg>
            </div>
            <h1>Elektrik Fatura Hesapla</h1>
            <p class="sub-text">Fatura PDF Analiz ve Tüketim Dağıtımı</p>
        </div>

        <section class="card">
            <label class="file-label">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                <span>FATURA PDF YÜKLE</span>
                <input type="file" id="pdfUpload" accept="application/pdf">
            </label>
            <div id="status" class="status-msg">Hazır</div>
        </section>

        <div class="form-grid">
            <div class="input-box">
                <label>Fatura Tutarı (₺)</label>
                <input type="number" id="toplamFatura" step="0.01" placeholder="0.00">
            </div>
            <div class="input-box">
                <label>Toplam Tüketim (kWh)</label>
                <input type="number" id="toplamKwh" step="0.001" placeholder="0.000">
            </div>
        </div>

        <section class="card" style="border-style: solid; border-width: 1px; background: rgba(0,0,0,0.1); margin-top: 15px;">
            <div class="form-grid" style="margin-bottom: 0;">
                <div class="input-box">
                    <label>İlk Endeks</label>
                    <input type="number" id="araIlkEndeks" step="0.001" placeholder="0000.000">
                </div>
                <div class="input-box">
                    <label>Son Endeks</label>
                    <input type="number" id="araSonEndeks" step="0.001" placeholder="0000.000">
                </div>
            </div>
        </section>

        <button id="calculateBtn" class="glow-button">Hesapla</button>

        <div id="resultCard" class="result-card hidden">
            <span class="res-title">Ara Sayaç Ödemesi</span>
            <div id="araSayacBorc" class="res-value">₺0,00</div>
            <div id="araTuketimBilgi" style="color:var(--accent); font-weight:800; font-size:15px;">Tüketim: 0 kWh</div>
        </div>
    </div>

    <div id="historyModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 style="margin:0; font-size: 16px; font-weight: 800;">Endeks Geçmişi</h3>
                <button id="closeHistory" class="close-btn">&times;</button>
            </div>
            <div id="historyList" style="max-height: 320px; overflow-y: auto;"></div>
        </div>
    </div>

    <script>
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        let history = JSON.parse(localStorage.getItem('endeksHistory')) || [];

        function saveToHistory(endeks) {
            const now = new Date();
            // Tarih formatı tekrar yıl bilgisi içerecek şekilde sabitlendi
            const dateStr = now.toLocaleDateString('tr-TR', { day: '2-digit', month: '2-digit', year: '2-digit' });
            const timeStr = now.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
            const fullStamp = `${dateStr} - ${timeStr}`;

            if (history.length > 0 && history[0].val === endeks) return;
            history.unshift({ id: Date.now(), date: fullStamp, val: endeks });
            if (history.length > 10) history.pop();
            localStorage.setItem('endeksHistory', JSON.stringify(history));
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = history.length === 0 ? '<p style="text-align:center; color:gray; padding:20px;">Kayıt bulunamadı.</p>' : '';
            history.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `
                    <div>
                        <div style="font-size:11px; color:var(--text-secondary)">${item.date}</div>
                        <div style="color:var(--accent); font-weight:800; font-size:16px;">${item.val} kWh</div>
                    </div>
                    <div style="display:flex; gap:8px;">
                        <button class="action-btn copy" onclick="copyToSon('${item.val}')" title="Son Endekse Gönder">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect width="14" height="14" x="8" y="8" rx="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                        </button>
                        <button class="action-btn delete" onclick="removeHistory(${item.id})" title="Sil">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                        </button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        window.copyToSon = (val) => {
            document.getElementById('araSonEndeks').value = val;
            document.getElementById('historyModal').classList.add('hidden');
        };

        window.removeHistory = (id) => {
            history = history.filter(i => i.id !== id);
            localStorage.setItem('endeksHistory', JSON.stringify(history));
            renderHistory();
        };

        document.getElementById('pdfUpload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('status').innerText = "Fatura taranıyor...";
            const reader = new FileReader();
            reader.onload = async function() {
                try {
                    const typedarray = new Uint8Array(this.result);
                    const pdf = await pdfjsLib.getDocument({data: typedarray}).promise;
                    const page = await pdf.getPage(1);
                    const textContent = await page.getTextContent();
                    const fullText = textContent.items.map(s => s.str).join(" ").replace(/\s+/g, ' ');
                    const tutarMatch = fullText.match(/ÖDENECEK\s*TUTAR\s*.*?([\d\.]+(,\d{2}))/i);
                    const kwhMatch = fullText.match(/Enerji\s*Tük\.\s*Bedeli.*?([\d\.]+(,\d{3}))/i);
                    if (tutarMatch) document.getElementById('toplamFatura').value = tutarMatch[1].replace(/\./g, '').replace(',', '.');
                    if (kwhMatch) document.getElementById('toplamKwh').value = kwhMatch[1].replace(/\./g, '').replace(',', '.');
                    document.getElementById('status').innerText = "Değerler dolduruldu ✓";
                } catch (err) {
                    document.getElementById('status').innerText = "PDF okunamadı!";
                }
            };
            reader.readAsArrayBuffer(file);
        });

        document.getElementById('calculateBtn').addEventListener('click', () => {
            const fTutar = parseFloat(document.getElementById('toplamFatura').value);
            const fKwh = parseFloat(document.getElementById('toplamKwh').value);
            const aIlk = parseFloat(document.getElementById('araIlkEndeks').value);
            const aSon = parseFloat(document.getElementById('araSonEndeks').value);
            if (!isNaN(fTutar) && !isNaN(fKwh) && !isNaN(aIlk) && !isNaN(aSon)) {
                saveToHistory(aSon.toString());
                const aTuketim = aSon - aIlk;
                const sonuc = (fTutar / fKwh) * aTuketim;
                document.getElementById('araSayacBorc').innerText = "₺" + sonuc.toLocaleString('tr-TR', {minimumFractionDigits: 2});
                document.getElementById('araTuketimBilgi').innerText = `Tüketim: ${aTuketim.toFixed(3)} kWh`;
                document.getElementById('resultCard').classList.remove('hidden');
            } else { alert("Tüm alanları doldurun!"); }
        });

        document.getElementById('historyBtn').addEventListener('click', () => { renderHistory(); document.getElementById('historyModal').classList.remove('hidden'); });
        document.getElementById('closeHistory').addEventListener('click', () => { document.getElementById('historyModal').classList.add('hidden'); });
    </script>
</body>
</html>
