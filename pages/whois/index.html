<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whois Analiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Consolas', 'Monaco', 'Courier New', monospace; overflow-x: hidden; }
        .terminal-box { border: 1px solid #30363d; background: #161b22; border-radius: 8px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
        
        /* Satır Düzeni */
        .info-row { display: flex; flex-direction: column; margin-bottom: 12px; line-height: 1.4; font-size: 15px; }
        @media (min-width: 640px) {
            .info-row { flex-direction: row; margin-bottom: 8px; }
            .label { min-width: 180px; flex-shrink: 0; }
            .divider { display: inline; margin-right: 15px; }
        }
        
        .label { color: #8b949e; font-weight: bold; }
        .divider { display: none; }
        .value { color: #e6edf3; word-break: break-all; }
        
        /* Dinamik Bölüm Çizgileri */
        .section-header { 
            display: flex; align-items: center; color: #39d353; font-weight: bold; margin: 25px 0 15px 0; font-size: 14px;
        }
        .section-header::after {
            content: ""; flex: 1; margin-left: 10px; height: 1px; background: rgba(57, 211, 83, 0.3);
        }

        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body class="p-4 sm:p-12">

    <div class="max-w-3xl mx-auto">
        <h1 class="text-2xl font-bold text-white mb-4 ml-1 tracking-tight">Whois</h1>

        <div class="flex flex-col sm:flex-row mb-10 gap-2 bg-[#161b22] p-2 border border-[#30363d] rounded-lg shadow-xl">
            <div class="flex items-center px-2 flex-1">
                <span class="text-blue-500 font-bold mr-3">❯</span>
                <input type="text" id="domainInput" placeholder="domain.com" 
                       class="bg-transparent border-none w-full text-white text-lg focus:outline-none focus:ring-0"
                       onkeypress="if(event.key === 'Enter') analyzeDomain()">
            </div>
            <button onclick="analyzeDomain()" class="bg-[#238636] hover:bg-[#2ea043] text-white px-8 py-2 rounded font-bold transition-all active:scale-95">
                SORGULA
            </button>
        </div>

        <div class="terminal-box p-6 sm:p-10">
            <div class="text-blue-400 font-bold mb-8 text-center text-xl tracking-[0.3em] border-b border-blue-900/30 pb-4">
                RESULT
            </div>

            <div id="loading" class="hidden text-yellow-500 mb-6 italic text-sm">
                <span class="mr-2">[*]</span> Veriler toplanıyor...
            </div>

            <div id="output" style="display:none;">
                <p class="text-yellow-500 mb-6 font-bold text-sm sm:text-base flex items-center">
                    <span class="text-gray-500 mr-2">[*]</span> HEDEF: <span id="out-target" class="ml-2 text-white border-b border-yellow-900"></span>
                </p>

                <h2 class="section-header">DOMAİN KİMLİĞİ</h2>
                <div class="info-row"><span class="label">Alan Adı</span><span class="divider">:</span><span class="value" id="out-domain"></span></div>
                <div class="info-row"><span class="label">Kayıt Tarihi</span><span class="divider">:</span><span class="value" id="out-reg"></span></div>
                <div class="info-row"><span class="label">Bitiş Tarihi</span><span class="divider">:</span><span class="value" id="out-exp"></span></div>
                <div class="info-row"><span class="label">Kayıt Firması</span><span class="divider">:</span><span class="value" id="out-registrar"></span></div>

                <h2 class="section-header">TEKNİK ALTYAPI</h2>
                <div class="info-row"><span class="label">Sunucu IP</span><span class="divider">:</span><span class="value text-blue-400 font-bold" id="out-ip"></span></div>
                <div class="info-row"><span class="label">Konum</span><span class="divider">:</span><span class="value" id="out-loc"></span></div>
                <div class="info-row">
                    <span class="label">DNS Sunucuları</span><span class="divider">:</span>
                    <div id="out-dns" class="text-gray-400 italic flex flex-col text-sm pt-1 sm:pt-0"></div>
                </div>

                <h2 class="section-header">GÜVENLİK DURUMU</h2>
                <div class="info-row">
                    <span class="label">Durum</span><span class="divider">:</span>
                    <div>
                        <span id="out-status" class="inline-block px-3 py-1 bg-green-900/20 text-green-400 border border-green-800/50 rounded text-[11px] font-bold uppercase tracking-tighter"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function analyzeDomain() {
            const domainInput = document.getElementById('domainInput');
            const domain = domainInput.value.trim().toLowerCase();
            if (!domain) return;

            const loading = document.getElementById('loading');
            const output = document.getElementById('output');
            
            loading.classList.remove('hidden');
            output.style.display = 'none';
            document.getElementById('out-target').innerText = domain.toUpperCase();

            try {
                const rdapRes = await fetch(`https://rdap.org/domain/${domain}`);
                if (!rdapRes.ok) throw new Error();
                const rdapData = await rdapRes.json();

                const dnsRes = await fetch(`https://dns.google/resolve?name=${domain}`);
                const dnsData = await dnsRes.json();
                const ipAddress = dnsData.Answer ? dnsData.Answer.find(a => a.type === 1)?.data : "Bulunamadı";

                let location = "Bilinmiyor";
                if(ipAddress !== "Bulunamadı") {
                    try {
                        const locRes = await fetch(`https://ipapi.co/${ipAddress}/json/`);
                        const locData = await locRes.json();
                        location = locData.city ? `${locData.city}, ${locData.country_name}` : "Tespit Edilemedi";
                    } catch(e) { location = "API Limiti"; }
                }

                const events = rdapData.events || [];
                document.getElementById('out-domain').innerText = domain;
                document.getElementById('out-reg').innerText = (events.find(e => e.eventAction === 'registration')?.eventDate || "Bilinmiyor").split('T')[0];
                document.getElementById('out-exp').innerText = (events.find(e => e.eventAction === 'expiration')?.eventDate || "Bilinmiyor").split('T')[0];
                document.getElementById('out-registrar').innerText = rdapData.entities?.[0]?.vcardArray?.[1]?.[1]?.[3] || "Gizli / Özel";
                document.getElementById('out-ip').innerText = ipAddress;
                document.getElementById('out-loc').innerText = location;
                
                const nsList = rdapData.nameservers || [];
                document.getElementById('out-dns').innerHTML = nsList.length > 0 
                    ? nsList.map(ns => `<span>• ${ns.ldhName.toLowerCase()}</span>`).join('')
                    : "<span>Veri yok</span>";

                const status = rdapData.status ? rdapData.status[0] : "Aktif";
                document.getElementById('out-status').innerText = status.includes('clientTransferProhibited') ? "GÜVENLİ (Kilitli)" : status;

                loading.classList.add('hidden');
                output.style.display = 'block';

            } catch (error) {
                loading.classList.add('hidden');
                alert("Domain bilgisi alınamadı. Lütfen geçerli bir domain girin.");
            }
        }
    </script>
</body>
</html>
