<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <title>Whois Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: radial-gradient(circle at center, #161b22 0%, #0d1117 100%);
            --system-bg: #0d1117;
            --surface: rgba(22, 27, 34, 0.9);
            --accent: #7cfc00;
            --accent-glow: rgba(124, 252, 0, 0.3);
            --border-neon: rgba(124, 252, 0, 0.2);
            --text-primary: #f8fafc;
            --text-secondary: #8b949e;
            --blur: 14px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            background-color: var(--system-bg);
            /* Çek-Yenile özelliğini tetiklemek için kritik */
            overscroll-behavior-y: auto; 
            height: 100%;
            overflow-x: hidden;
        }

        body {
            background: var(--bg);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Consolas', monospace;
            color: var(--text-primary);
            padding: 20px;
            /* Sorgu yokken scroll oluşmaz, içerik uzarsa otomatik açılır */
            overflow-y: auto; 
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--surface);
            backdrop-filter: blur(var(--blur));
            -webkit-backdrop-filter: blur(var(--blur));
            border: 1px solid var(--border-neon);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
            margin: auto;
        }

        h1 {
            font-size: 22px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 15px var(--accent-glow);
        }

        .input-group {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.5);
            padding: 6px;
            border: 1px solid var(--border-neon);
            border-radius: 12px;
            margin-bottom: 25px;
            transition: 0.3s;
        }
        
        .input-group:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        input {
            flex: 1;
            min-width: 0;
            background: transparent;
            border: none;
            outline: none;
            color: var(--accent);
            padding: 10px 12px;
            font-size: 16px;
            font-weight: bold;
        }

        .btn-search {
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 8px;
            width: 44px;
            height: 44px;
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .result-header-area {
            text-align: center;
            margin-top: 10px;
        }

        .result-title {
            color: #3b82f6;
            font-weight: 900;
            letter-spacing: 0.4em;
            font-size: 16px;
            text-transform: uppercase;
            margin-bottom: 8px;
            opacity: 0.8;
        }

        .result-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.4), transparent);
            width: 100%;
            margin-bottom: 15px;
        }

        .result-box {
            display: none;
            animation: fadeIn 0.6s ease forwards;
        }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .section-header {
            display: flex; align-items: center; color: var(--accent); font-weight: 800; 
            margin: 20px 0 12px 0; font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
        }
        .section-header::after { content: ""; flex: 1; margin-left: 10px; height: 1px; background: var(--border-neon); }

        .info-row {
            display: flex; flex-direction: column; margin-bottom: 12px; font-size: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.03); padding-bottom: 8px;
        }

        @media (min-width: 400px) {
            .info-row { flex-direction: row; justify-content: space-between; }
            .value { text-align: right; max-width: 60%; }
        }

        .label { color: var(--text-secondary); font-weight: 600; font-size: 13px; }
        .value { color: var(--text-primary); word-break: break-all; }
        .value.ip { color: var(--accent); font-family: monospace; font-weight: bold; }

        #loading { color: #eab308; font-size: 13px; text-align: center; display: none; margin: 15px 0; font-style: italic; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

        .status-badge {
            background: rgba(124, 252, 0, 0.1);
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 800;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Whois Analyzer</h1>

        <div class="input-group">
            <input type="text" id="domainInput" placeholder="domain.com" autocomplete="off" onkeypress="if(event.key === 'Enter') analyzeDomain()">
            <button class="btn-search" onclick="analyzeDomain()">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </div>

        <div id="result-header" class="result-header-area">
            <div class="result-title">RESULT</div>
            <div class="result-divider"></div>
        </div>

        <div id="loading">
            <span class="blink">[*]</span> VERİLER ANALİZ EDİLİYOR...
        </div>

        <div id="output" class="result-box">
            <div class="text-center mb-6">
                <span class="text-[10px] text-gray-500 uppercase tracking-widest">Analiz Edilen Hedef</span>
                <div id="out-target" class="text-lg font-black text-white border-b-2 border-green-500 inline-block px-4">DOMAIN.COM</div>
            </div>

            <h2 class="section-header">DOMAİN KİMLİĞİ</h2>
            <div class="info-row"><span class="label">Alan Adı</span><span class="value" id="out-domain"></span></div>
            <div class="info-row"><span class="label">Kayıt Tarihi</span><span class="value" id="out-reg"></span></div>
            <div class="info-row"><span class="label">Bitiş Tarihi</span><span class="value" id="out-exp"></span></div>
            <div class="info-row"><span class="label">Kayıt Firması</span><span class="value" id="out-registrar"></span></div>

            <h2 class="section-header">TEKNİK ALTYAPI</h2>
            <div class="info-row"><span class="label">IP Adresi</span><span class="value ip" id="out-ip"></span></div>
            <div class="info-row"><span class="label">Konum</span><span class="value" id="out-loc"></span></div>
            <div class="info-row">
                <span class="label">DNS Listesi</span>
                <div id="out-dns" class="value text-[12px] italic text-gray-400"></div>
            </div>

            <h2 class="section-header">GÜVENLİK DURUMU</h2>
            <div class="info-row">
                <span class="label">Status</span>
                <div><span id="out-status" class="status-badge">AKTİF</span></div>
            </div>
        </div>
    </div>

    <script>
        async function analyzeDomain() {
            const domainInput = document.getElementById('domainInput');
            const domain = domainInput.value.trim().toLowerCase();
            if (!domain) return;

            const loading = document.getElementById('loading');
            const output = document.getElementById('output');

            loading.style.display = 'block';
            output.style.display = 'none';

            document.getElementById('out-target').innerText = domain.toUpperCase();

            try {
                const rdapRes = await fetch(`https://rdap.org/domain/${domain}`);
                if (!rdapRes.ok) throw new Error("Hata");
                const rdapData = await rdapRes.json();

                const dnsRes = await fetch(`https://dns.google/resolve?name=${domain}`);
                const dnsData = await dnsRes.json();
                const ipAddress = dnsData.Answer ? dnsData.Answer.find(a => a.type === 1)?.data : "Bulunamadı";

                let location = "Bilinmiyor";
                if(ipAddress !== "Bulunamadı") {
                    try {
                        const locRes = await fetch(`https://ipapi.co/${ipAddress}/json/`);
                        const locData = await locRes.json();
                        location = locData.city ? `${locData.city}, ${locData.country_name}` : "Tespit Edilemedi";
                    } catch(e) { location = "API Limiti"; }
                }

                const events = rdapData.events || [];
                document.getElementById('out-domain').innerText = domain;
                document.getElementById('out-reg').innerText = (events.find(e => e.eventAction === 'registration')?.eventDate || "Bilinmiyor").split('T')[0];
                document.getElementById('out-exp').innerText = (events.find(e => e.eventAction === 'expiration')?.eventDate || "Bilinmiyor").split('T')[0];
                document.getElementById('out-registrar').innerText = rdapData.entities?.[0]?.vcardArray?.[1]?.[1]?.[3] || "Gizli / Özel";
                document.getElementById('out-ip').innerText = ipAddress;
                document.getElementById('out-loc').innerText = location;

                const nsList = rdapData.nameservers || [];
                document.getElementById('out-dns').innerHTML = nsList.length > 0
                    ? nsList.map(ns => `<div>• ${ns.ldhName.toLowerCase()}</div>`).join('')
                    : "Veri yok";

                const statusArr = rdapData.status || ["Aktif"];
                document.getElementById('out-status').innerText = statusArr[0].includes('clientTransferProhibited') ? "GÜVENLİ (KİLİTLİ)" : statusArr[0].toUpperCase();

                loading.style.display = 'none';
                output.style.display = 'block';

            } catch (error) {
                loading.style.display = 'none';
                alert("Veri alınamadı. Domain adresini kontrol edin.");
            }
        }
    </script>
</body>
</html>
